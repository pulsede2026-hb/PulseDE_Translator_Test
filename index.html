<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body{
    margin:0;
    padding:0;
    background:#090909;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 18px;
    background:#090909;
    border-bottom:2px solid #d6a84f;
    color:white;
    font-size:14px;
    box-sizing:border-box;
    gap:10px;
    flex-wrap:wrap;
}

.leftinfo{
    color:#ddd;
}

.rightinfo{
    color:#ffd76a;
    font-weight:bold;
}

.lang-link{
    cursor:pointer;
    color:#ffd76a;
    text-decoration:none;
}

.lang-link:hover{
    text-decoration:underline;
}

@media(max-width:700px){
    .topbar{
        justify-content:center;
        text-align:center;
        font-size:13px;
        padding:8px 10px;
    }
}
</style>
</head>

<body>

<div class="topbar">

<div class="leftinfo">
💻 Strg + / - / 0 &nbsp;&nbsp; 📱 Finger spreizen
</div>

<div class="rightinfo" id="languageStatus">
🌍 DE ✓ | EN | NL | FR | ES
</div>

</div>

<script>
const langs = ["de","en","nl","fr","es"];

const labels = {
de:"DE",
en:"EN",
nl:"NL",
fr:"FR",
es:"ES"
};

function updateLanguageDisplay(lang){

let html = "🌍 ";

langs.forEach((l,index)=>{

html += `<span class="lang-link" onclick="setLanguage('${l}')">${labels[l]}${l===lang?' ✓':''}</span>`;

if(index < langs.length-1){
html += " | ";
}

});

document.getElementById("languageStatus").innerHTML = html;

}

function setLanguage(lang){

localStorage.setItem("language",lang);

updateLanguageDisplay(lang);

}

window.onload = function(){

const lang = localStorage.getItem("language") || "de";

updateLanguageDisplay(lang);

}
</script>

</body>
</html>
